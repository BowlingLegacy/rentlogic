<!DOCTYPE html>
<html>
<head>
    <title>Approve Application</title>
</head>
<body style="font-family: Tahoma; padding: 40px; background: #f6f1e8;">

<h1>Approve Application</h1>

<p>
    <strong>Applicant:</strong> {{ application.full_name }}<br>
    <strong>Email:</strong> {{ application.email }}<br>
    <strong>Property:</strong>
    {% if application.property %}
        {{ application.property.name }}
    {% else %}
        Not assigned
    {% endif %}
</p>

<form method="post" style="max-width: 760px;">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" style="padding: 12px 22px; font-weight: bold;">
        Approve And Create Invite
    </button>
</form>

</body>
</html>
