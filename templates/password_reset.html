{% extends "base.html" %}
{% block content %}

<div class="container my-5" style="max-width:600px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="fw-bold mb-3">Reset Password</h2>

            <p class="text-muted">
                Enter the email address connected to your account. If an account exists, we will send password reset instructions.
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.email.label_tag }}
                {{ form.email }}

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Send Reset Link
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}">Return to Login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
