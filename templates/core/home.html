<!DOCTYPE html>
<html>
<head>
    <title>RentLogic</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: linear-gradient(to right, #0d1b2a, #1b263b);
            color: white;
            text-align: center;
            padding: 60px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: 2px solid white;
            background: gold;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            margin: 10px;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: orange;
        }
    </style>
</head>
<body>

    <h1>RentLogic</h1>
    <p>Property Management. Simplified. Organized. Powerful.</p>

    <a href="#" class="btn">Landlord Login</a>
    <a href="#" class="btn">Apply for Housing</a>

</body>
</html>
