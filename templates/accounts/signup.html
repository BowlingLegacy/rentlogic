<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
</head>
<body style="font-family: Tahoma; padding: 40px;">

<h1>Create Your RentLogic Account</h1>

<p>
    Account type:
    {% if invite.code_type == "owner" %}
        <strong>Landlord / Property Owner</strong>
    {% else %}
        <strong>Tenant / Applicant</strong>
    {% endif %}
</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Account</button>
</form>

</body>
</html>
