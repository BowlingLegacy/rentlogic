<!DOCTYPE html>
<html>
<head>
    <title>Enter Invite Code</title>
</head>
<body style="font-family: Tahoma; padding: 40px;">

<h1>Enter Your RentLogic Invite Code</h1>

{% endfor %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>

</body>
</html>
