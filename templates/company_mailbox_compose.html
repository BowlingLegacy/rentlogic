{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-header bg-dark text-warning d-flex justify-content-between align-items-start flex-wrap gap-3">
        <div>
            <div class="text-uppercase small fw-bold">Company Mailbox</div>
            <h1 class="h3 fw-bold mb-1">Compose Email</h1>
            <div class="text-white-50">Sending from {{ mailbox_email }}</div>
        </div>
        <a href="{% url 'company_mailbox' %}" class="btn btn-outline-light">Inbox</a>
    </div>

    <div class="card-body">
        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold" for="{{ form.to_email.id_for_label }}">To</label>
                {{ form.to_email }}
                {{ form.to_email.errors }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="{{ form.subject.id_for_label }}">Subject</label>
                {{ form.subject }}
                {{ form.subject.errors }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="{{ form.body.id_for_label }}">Message</label>
                {{ form.body }}
                {{ form.body.errors }}
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn btn-primary fw-bold">Send Email</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
