{% extends "base.html" %}
{% block content %}

<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h1 class="fw-bold mb-1">Create Property Blog Post</h1>
                    <p class="text-muted mb-0">Choose the property so each blog stays separate.</p>
                </div>
                <a href="{% url 'property_blog_manager' %}" class="btn btn-outline-secondary">Back</a>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Publish Post</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
