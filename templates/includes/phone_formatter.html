<script>
    (function () {
        function phoneDigits(value) {
            let digits = (value || "").replace(/\D/g, "");
            if (digits.length === 11 && digits.charAt(0) === "1") {
                digits = digits.slice(1);
            }
            return digits.slice(0, 10);
        }

        function formatPhone(value) {
            const digits = phoneDigits(value);
            if (digits.length <= 3) {
                return digits;
            }
            if (digits.length <= 6) {
                return "(" + digits.slice(0, 3) + ")" + digits.slice(3);
            }
            return "(" + digits.slice(0, 3) + ")" + digits.slice(3, 6) + "-" + digits.slice(6);
        }

        function looksLikePhoneInput(input) {
            const labelText = input.labels ? Array.from(input.labels).map(function (label) { return label.textContent; }).join(" ") : "";
            const haystack = [
                input.name,
                input.id,
                input.placeholder,
                input.getAttribute("aria-label"),
                labelText,
            ].join(" ").toLowerCase();
            return haystack.includes("phone") || haystack.includes("mobile") || input.type === "tel";
        }

        function attachPhoneFormatter(input) {
            if (input.dataset.phoneFormatterAttached === "true" || !looksLikePhoneInput(input)) {
                return;
            }
            input.dataset.phoneFormatterAttached = "true";
            input.setAttribute("inputmode", "tel");
            input.setAttribute("autocomplete", input.getAttribute("autocomplete") || "tel");
            input.addEventListener("input", function () {
                input.value = formatPhone(input.value);
            });
            input.addEventListener("blur", function () {
                input.value = formatPhone(input.value);
            });
            if (input.value) {
                input.value = formatPhone(input.value);
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.querySelectorAll("input[type='text'], input[type='tel'], input:not([type])").forEach(attachPhoneFormatter);
        });
    })();
</script>
