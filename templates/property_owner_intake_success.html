{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Questionnaire Received | Rental Ledger Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #faf6ee 0%, #f2ead9 100%);
            min-height: 100vh;
            color: #1c1c1c;
        }
        .success-card {
            background: rgba(255,255,255,.94);
            border: 1px solid rgba(188,150,45,.28);
            border-radius: 20px;
            box-shadow: 0 12px 34px rgba(0,0,0,.1);
            max-width: 760px;
            margin: 4rem auto;
            overflow: hidden;
        }
        .success-head {
            background: #111;
            border-bottom: 2px solid #c59a32;
            color: #f6ead1;
            padding: 1.5rem;
        }
        .gold-btn {
            background: linear-gradient(135deg, #c48f22, #d8ab3b);
            border-radius: 10px;
            color: #fff;
            display: inline-flex;
            font-weight: 900;
            padding: .8rem 1.1rem;
            text-decoration: none;
        }
        .gold-btn:hover { color: #fff; filter: brightness(.96); }
    </style>
</head>
<body>
<main class="container">
    <div class="success-card">
        <div class="success-head">
            <div class="small text-uppercase fw-bold" style="letter-spacing:.16em;color:#d8ab3b;">Rental Ledger Pro</div>
            <h1 class="fw-bold mb-0">Questionnaire Received</h1>
        </div>
        <div class="p-4 p-md-5">
            <p class="fs-5">
                Your property owner questionnaire has been submitted. Bowling Legacy can review your portfolio,
                operating needs, current records, and dashboard priorities before the next setup step.
            </p>
            <a href="/" class="gold-btn">Back Home</a>
        </div>
    </div>
</main>
</body>
</html>
