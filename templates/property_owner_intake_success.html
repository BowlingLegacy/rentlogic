{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Questionnaire Received | Rental Ledger Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --night: #10151f;
            --midnight: #172233;
            --panel: #f8fbf7;
            --cyan: #10c7c2;
            --lime: #a9d95b;
            --amber: #ffb342;
        }
        body {
            background:
                radial-gradient(circle at top right, rgba(16,199,194,.18), transparent 34%),
                radial-gradient(circle at bottom left, rgba(118,100,255,.16), transparent 30%),
                var(--night);
            min-height: 100vh;
            color: var(--night);
        }
        .success-card {
            background: rgba(248,251,247,.97);
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 16px;
            box-shadow: 0 22px 70px rgba(0,0,0,.28);
            max-width: 760px;
            margin: 4rem auto;
            overflow: hidden;
        }
        .success-head {
            background:
                linear-gradient(120deg, rgba(23,34,51,.96), rgba(16,21,31,.90)),
                url("https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1600&q=82") center/cover;
            border-bottom: 3px solid var(--cyan);
            color: var(--panel);
            padding: 1.5rem;
        }
        .success-kicker {
            background: var(--lime);
            border-radius: 999px;
            color: var(--night);
            display: inline-flex;
            font-size: .78rem;
            font-weight: 950;
            letter-spacing: .14em;
            padding: .45rem .7rem;
            text-transform: uppercase;
        }
        .gold-btn {
            background: var(--amber);
            border-radius: 8px;
            color: #111;
            display: inline-flex;
            font-weight: 900;
            padding: .8rem 1.1rem;
            text-decoration: none;
        }
        .gold-btn:hover { color: #111; background: #f2a52c; }
    </style>
</head>
<body>
<main class="container">
    <div class="success-card">
        <div class="success-head">
            <div class="success-kicker">Rental Ledger Pro</div>
            <h1 class="fw-bold mb-0">Questionnaire Received</h1>
        </div>
        <div class="p-4 p-md-5">
            <p class="fs-5">
                Your property owner questionnaire has been submitted. Bowling Legacy can review your portfolio,
                operating needs, current records, and dashboard priorities before the next setup step.
            </p>
            <a href="/" class="gold-btn">Back Home</a>
        </div>
    </div>
</main>
</body>
</html>
